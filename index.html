<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Noonan Practice Wiki — Network Map v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --clr-matter:#60a5fa;  /* blue */
    --clr-contact:#c084fc; /* violet */
    --clr-court:#34d399;   /* emerald */
    --clr-authority:#fbbf24;/* amber */
    --clr-issue:#fb7185;   /* rose */
    --clr-client:#e879f9;  /* fuchsia — client-flagged contacts */
    --clr-overdue:#ef4444;
    --clr-today:#f59e0b;
    --clr-upcoming:#3b82f6;
    --bg:#0a0e17;
    --bg-panel:rgba(15,20,33,0.96);
    --bg-bar:rgba(10,14,23,0.92);
  }

  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);color:#e2e8f0;
    overflow:hidden;height:100vh;width:100vw;
  }

  /* ===== TOP BAR ===== */
  #top-bar{
    position:fixed;top:0;left:0;right:0;
    min-height:56px;
    background:var(--bg-bar);backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.06);
    display:flex;align-items:center;
    padding:8px 16px;z-index:100;gap:10px;flex-wrap:wrap;
  }
  #top-bar h1{font-size:15px;font-weight:600;color:#f1f5f9;letter-spacing:-0.3px;white-space:nowrap}
  #top-bar .sub{font-size:12px;color:#64748b;white-space:nowrap}

  .view-toggles{display:flex;gap:3px;background:rgba(255,255,255,0.04);border-radius:8px;padding:3px;border:1px solid rgba(255,255,255,0.06);flex-shrink:0}
  .view-btn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#64748b;transition:all .2s;white-space:nowrap;font-family:inherit}
  .view-btn:hover{color:#94a3b8}
  .view-btn.active{background:rgba(99,102,241,0.2);color:#a5b4fc}

  #filter-bar{display:flex;gap:5px;align-items:center;overflow-x:auto;flex-shrink:1;min-width:0;scrollbar-width:none}
  #filter-bar::-webkit-scrollbar{display:none}
  .fp{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#94a3b8;transition:all .2s;white-space:nowrap;user-select:none;flex-shrink:0;-webkit-tap-highlight-color:transparent;min-height:30px}
  .fp:hover{background:rgba(255,255,255,0.08)}
  .fp.active{border-color:var(--pc,#6366f1);background:var(--pb,rgba(99,102,241,0.15));color:var(--pc,#a5b4fc)}
  .fp .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}

  #search-box{position:relative;flex:0 1 220px;margin-left:auto;flex-shrink:0}
  #search-box input{width:100%;padding:8px 12px 8px 32px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#e2e8f0;font-size:13px;font-family:inherit;outline:none;transition:all .2s;min-height:36px}
  #search-box input:focus{background:rgba(255,255,255,0.1);border-color:rgba(99,102,241,0.5);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
  #search-box input::placeholder{color:#475569}
  #search-box .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#475569;font-size:13px;pointer-events:none}

  /* ===== HOT BANNER ===== */
  #hot-banner{position:fixed;top:56px;left:0;right:0;background:linear-gradient(180deg,rgba(15,10,5,.97),rgba(10,14,23,.95));backdrop-filter:blur(20px);border-bottom:1px solid rgba(239,68,68,0.15);z-index:95;max-height:220px;overflow:hidden;transition:max-height .4s cubic-bezier(.16,1,.3,1),opacity .3s;opacity:1}
  #hot-banner.collapsed{max-height:0;opacity:0;pointer-events:none}
  .hb-inner{padding:12px 16px 14px}
  .hb-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .hb-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#ef4444}
  .hb-count{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(239,68,68,0.15);color:#fca5a5;font-weight:600}
  .hb-hide{margin-left:auto;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#64748b;cursor:pointer;padding:4px 10px;font-size:11px;font-family:inherit;transition:all .15s}
  .hb-hide:hover{background:rgba(255,255,255,0.1);color:#94a3b8}
  .hb-grid{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .hb-grid::-webkit-scrollbar{display:none}
  .hc{flex-shrink:0;padding:10px 14px;border-radius:10px;cursor:pointer;min-width:190px;max-width:280px;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .hc:hover{transform:translateY(-1px)}
  .hc.overdue{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);box-shadow:0 0 20px rgba(239,68,68,.08)}
  .hc.today{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);box-shadow:0 0 20px rgba(245,158,11,.08)}
  .hc.upcoming{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2)}
  .hc-u{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:4px;margin-bottom:6px}
  .hc.overdue .hc-u{background:rgba(239,68,68,.2);color:#fca5a5}
  .hc.today .hc-u{background:rgba(245,158,11,.2);color:#fcd34d}
  .hc.upcoming .hc-u{background:rgba(59,130,246,.2);color:#93c5fd}
  .hc-l{font-size:13px;font-weight:600;margin-bottom:4px}
  .hc.overdue .hc-l{color:#fca5a5}.hc.today .hc-l{color:#fcd34d}.hc.upcoming .hc-l{color:#93c5fd}
  .hc-t{font-size:11px;color:#94a3b8;line-height:1.4}

  /* ===== GRAPH ===== */
  #graph-container{width:100vw;height:100vh;position:relative}
  svg{width:100%;height:100%;display:block}
  .link{stroke-linecap:round}
  .node-label{font-family:'Inter',sans-serif;font-size:10px;fill:#94a3b8;pointer-events:none;text-anchor:middle;dominant-baseline:central}

  @keyframes pulseOverdue{0%{r:0;opacity:.7}50%{opacity:.2}100%{r:40;opacity:0}}
  @keyframes pulseToday{0%{r:0;opacity:.6}50%{opacity:.15}100%{r:36;opacity:0}}
  @keyframes pulseUpcoming{0%{r:0;opacity:.4}50%{opacity:.1}100%{r:30;opacity:0}}
  @keyframes ringSpin{0%{stroke-dashoffset:0}100%{stroke-dashoffset:50}}
  .hot-ring{animation:ringSpin 4s linear infinite}

  /* ===== CALENDAR ===== */
  #cal-view{display:none;position:fixed;top:56px;left:0;right:0;bottom:0;background:var(--bg);z-index:50;overflow-y:auto;-webkit-overflow-scrolling:touch}
  #cal-view.active{display:block}
  .cal-inner{max-width:1000px;margin:0 auto;padding:20px 20px 80px}
  .cal-mh{font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:16px;letter-spacing:-.5px}
  .cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:32px}
  .cal-dh{text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#475569;padding:8px 0}
  .cal-d{min-height:90px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:6px;padding:6px;transition:background .15s}
  .cal-d:hover{background:rgba(255,255,255,.04)}
  .cal-d.empty{background:transparent;border-color:transparent}
  .cal-d.td{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.04)}
  .cal-dn{font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px}
  .cal-d.td .cal-dn{color:#f59e0b}
  .cal-ev{font-size:10px;padding:3px 6px;border-radius:4px;margin-bottom:3px;cursor:pointer;line-height:1.3;transition:all .15s;min-height:22px;display:flex;align-items:center;-webkit-tap-highlight-color:transparent}
  .cal-ev:hover{filter:brightness(1.2);transform:translateX(2px)}
  .cal-ev.overdue{background:rgba(239,68,68,.15);color:#fca5a5;border-left:2px solid #ef4444}
  .cal-ev.today-ev{background:rgba(245,158,11,.15);color:#fcd34d;border-left:2px solid #f59e0b}
  .cal-ev.upcoming-ev{background:rgba(59,130,246,.12);color:#93c5fd;border-left:2px solid #3b82f6}

  .tl-sec{margin-top:12px}
  .tl-sec-t{font-size:13px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06)}
  .tl-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .tl-item:hover{transform:translateX(4px)}
  .tl-item.overdue{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.12)}
  .tl-item.today-tl{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.12)}
  .tl-item.upcoming-tl{background:rgba(59,130,246,.05);border:1px solid rgba(59,130,246,.1)}
  .tl-dt{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;min-width:70px;flex-shrink:0}
  .tl-dt.overdue{color:#fca5a5}.tl-dt.today-tl{color:#fcd34d}.tl-dt.upcoming-tl{color:#93c5fd}
  .tl-c{flex:1}
  .tl-l{font-size:13px;font-weight:600;color:#f1f5f9;margin-bottom:2px}
  .tl-d{font-size:11px;color:#94a3b8;line-height:1.4}
  .tl-b{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:4px;flex-shrink:0;align-self:center}

  /* ===== MOBILE / CARDS ===== */
  #cards-view{display:none;position:fixed;top:56px;left:0;right:0;bottom:0;background:var(--bg);z-index:50;overflow-y:auto;-webkit-overflow-scrolling:touch}
  #cards-view.active{display:block}
  .mob-inner{max-width:600px;margin:0 auto;padding:16px 16px 80px}
  .mob-sec{margin-bottom:24px}
  .mob-sec-t{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:8px 0;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px}
  .mob-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .mob-c{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;min-height:48px}
  .mob-c:hover,.mob-c:active{background:rgba(255,255,255,.06);transform:translateY(-1px)}
  .mob-c.ho{border-left:3px solid var(--clr-overdue);box-shadow:inset 0 0 20px rgba(239,68,68,.04)}
  .mob-c.ht{border-left:3px solid var(--clr-today);box-shadow:inset 0 0 20px rgba(245,158,11,.04)}
  .mob-c.hu{border-left:3px solid var(--clr-upcoming)}
  .mob-c-title{font-size:14px;font-weight:600;color:#f1f5f9;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .mob-c-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:4px;flex-shrink:0}
  .mob-c-sum{font-size:12px;color:#94a3b8;line-height:1.5;margin-top:6px}
  .mob-c-hot{font-size:11px;margin-top:6px;padding:6px 10px;border-radius:6px}
  .mob-c-hot.overdue{background:rgba(239,68,68,.1);color:#fca5a5}
  .mob-c-hot.today{background:rgba(245,158,11,.1);color:#fcd34d}
  .mob-c-hot.upcoming{background:rgba(59,130,246,.1);color:#93c5fd}
  .mob-c-det{display:none;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)}
  .mob-c.expanded .mob-c-det{display:block}

  /* ===== DETAIL PANEL ===== */
  #detail-panel{
    position:fixed;top:56px;right:-420px;width:400px;max-width:100vw;
    height:calc(100vh - 56px);
    background:var(--bg-panel);backdrop-filter:blur(24px);
    border-left:1px solid rgba(255,255,255,.06);
    z-index:90;transition:right .35s cubic-bezier(.16,1,.3,1);
    overflow-y:auto;overflow-x:hidden;
  }
  #detail-panel.open{right:0}
  #detail-panel::-webkit-scrollbar{width:6px}
  #detail-panel::-webkit-scrollbar-track{background:transparent}
  #detail-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

  .p-hdr{
    padding:20px 20px 16px;
    border-bottom:1px solid rgba(255,255,255,.06);
    position:sticky;top:0;
    background:rgba(15,20,33,.98);backdrop-filter:blur(24px);
    z-index:2;
    /* Ensure room for close button */
    padding-right:64px;
  }

  /* MOBILE CLOSE BUTTON FIX */
  .p-close{
    position:absolute;
    top:12px;right:12px;
    width:44px;height:44px;
    border-radius:10px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.1);
    color:#cbd5e1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;font-weight:400;
    transition:all .15s;
    -webkit-tap-highlight-color:transparent;
    z-index:10;
    /* Never hidden or clipped */
    touch-action:manipulation;
  }
  .p-close:hover,.p-close:active{background:rgba(255,255,255,.15);color:#f8fafc;transform:scale(1.05)}

  .p-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  .p-title{font-size:18px;font-weight:700;color:#f8fafc;line-height:1.3;letter-spacing:-.3px}
  .p-status{margin-top:8px;font-size:12px;color:#94a3b8;display:flex;align-items:center;gap:8px}
  .sdot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .p-body{padding:20px 20px 32px}
  .p-sec{margin-bottom:20px}
  .p-sec-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:10px}
  .p-sec p{font-size:13px;line-height:1.6;color:#cbd5e1}
  .rc{display:inline-block;padding:5px 10px;margin:3px 4px 3px 0;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);-webkit-tap-highlight-color:transparent;min-height:32px}
  .rc:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15)}
  .uf{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:8px;margin-bottom:8px;font-size:13px;line-height:1.5}
  .uf.overdue{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
  .uf.today{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#fcd34d}
  .uf.upcoming{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#93c5fd}
  .uf .fi{font-size:14px;flex-shrink:0;margin-top:1px}

  /* ===== LEGEND & STATS ===== */
  #legend{position:fixed;bottom:16px;left:16px;background:rgba(15,20,33,.92);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px 16px;z-index:80;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .li{display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8;white-space:nowrap}
  .ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  #stats{position:fixed;bottom:16px;right:16px;background:rgba(15,20,33,.92);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px 16px;z-index:80;font-size:11px;color:#64748b;display:flex;gap:14px}
  .sv{color:#e2e8f0;font-weight:600;font-variant-numeric:tabular-nums}
  .node-tooltip{position:absolute;padding:8px 12px;background:rgba(15,20,33,.95);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:12px;color:#e2e8f0;pointer-events:none;opacity:0;transition:opacity .15s;white-space:nowrap;z-index:200;backdrop-filter:blur(8px)}
  .node-tooltip.visible{opacity:1}

  /* Client star indicator in legend */
  .client-star{color:var(--clr-client);font-size:12px}

  /* ===== RESPONSIVE ===== */
  @media(max-width:900px){
    #top-bar{gap:8px;padding:6px 10px}
    #top-bar .sub{display:none}
    #search-box{flex:1 1 140px}
    #legend{bottom:8px;left:8px;padding:8px 12px;gap:10px}
    #stats{bottom:8px;right:8px;padding:8px 12px}
    #detail-panel{width:100vw;max-width:100vw}
    .cal-d{min-height:70px;padding:4px}
    .cal-ev{font-size:9px;padding:2px 4px}
  }
  @media(max-width:600px){
    .fp{padding:4px 8px;font-size:10px}
    #search-box{flex:1 1 100px}
    #legend{max-width:calc(100vw - 100px)}
    .cal-d{min-height:56px}.cal-dn{font-size:10px}
    .hc{min-width:160px;padding:8px 10px}
    /* Ensure panel close button always visible on small screens */
    .p-hdr{padding:16px 16px 14px;padding-right:60px}
    .p-close{top:10px;right:10px;width:44px;height:44px}
    .p-title{font-size:16px}
  }
</style>
</head>
<body>

<div id="top-bar">
  <h1>Noonan Practice Wiki</h1>
  <span class="sub">Schema v2.0 &middot; April 14, 2026</span>
  <div class="view-toggles">
    <button class="view-btn active" data-view="graph" onclick="switchView('graph')">Graph</button>
    <button class="view-btn" data-view="calendar" onclick="switchView('calendar')">Calendar</button>
    <button class="view-btn" data-view="cards" onclick="switchView('cards')">Cards</button>
  </div>
  <div id="filter-bar">
    <div class="fp active" data-type="all" style="--pc:#a5b4fc;--pb:rgba(99,102,241,0.15)">All</div>
    <div class="fp" data-type="matter" style="--pc:var(--clr-matter);--pb:rgba(96,165,250,0.12)"><span class="dot" style="background:var(--clr-matter)"></span>Matter</div>
    <div class="fp" data-type="contact" style="--pc:var(--clr-contact);--pb:rgba(192,132,252,0.12)"><span class="dot" style="background:var(--clr-contact)"></span>Contact</div>
    <div class="fp" data-type="court" style="--pc:var(--clr-court);--pb:rgba(52,211,153,0.12)"><span class="dot" style="background:var(--clr-court)"></span>Court</div>
    <div class="fp" data-type="authority" style="--pc:var(--clr-authority);--pb:rgba(251,191,36,0.12)"><span class="dot" style="background:var(--clr-authority)"></span>Authority</div>
    <div class="fp" data-type="issue" style="--pc:var(--clr-issue);--pb:rgba(251,113,133,0.12)"><span class="dot" style="background:var(--clr-issue)"></span>Issue</div>
  </div>
  <div id="search-box">
    <span class="si">&#128269;</span>
    <input type="text" id="search-input" placeholder="Search... ( / )">
  </div>
</div>

<div id="hot-banner">
  <div class="hb-inner">
    <div class="hb-head">
      <span class="hb-title">Action Required</span>
      <span class="hb-count" id="hot-count"></span>
      <button class="hb-hide" onclick="toggleBanner()">Hide</button>
    </div>
    <div class="hb-grid" id="hb-grid"></div>
  </div>
</div>

<div id="graph-container"><svg id="graph-svg"></svg></div>
<div id="cal-view"></div>
<div id="cards-view"></div>

<div id="detail-panel">
  <div class="p-hdr">
    <button class="p-close" onclick="closePanel()" aria-label="Close">&times;</button>
    <div id="p-badge" class="p-badge"></div>
    <div id="p-title" class="p-title"></div>
    <div id="p-status" class="p-status"></div>
  </div>
  <div class="p-body" id="p-body"></div>
</div>

<div id="legend">
  <div class="li"><div class="ld" style="background:var(--clr-matter)"></div>Matter</div>
  <div class="li"><div class="ld" style="background:var(--clr-contact)"></div>Contact</div>
  <div class="li"><div class="ld" style="background:var(--clr-client)"></div>Client <span class="client-star">&#9733;</span></div>
  <div class="li"><div class="ld" style="background:var(--clr-court)"></div>Court</div>

function nodeColor(d) {
  if (d.type==='contact' && d.role==='client') return CLIENT_CLR;

}

function nodeColorDim(d) {
  if (d.type==='contact' && d.role==='client') return 'rgba(232,121,249,0.15)';
  return TD[d.type] || 'rgba(99,102,241,0.15)';
}

// Court level sizing
function courtScale(d) {
  if (d.type!=='court') return 1;
  if (d.level==='county') return 1.3;
  if (d.level==='branch') return 0.75;
  return 1; // department
}

// Connection counts for node sizing
const cc = {};
dl.forEach(l=>{cc[l.source]=(cc[l.source]||0)+1;cc[l.target]=(cc[l.target]||0)+1});

function nodeRadius(d) {
  const conns = cc[d.id]||1;
  const base = d.hasPage ? 14 : 10;
  return (base + Math.min(conns*1.5, 10)) * courtScale(d);
}

function typeLetter(d) {
  return {matter:'M',contact:'C',court:'Ct',authority:'A',issue:'I'}[d.type]||'?';
}

function buildHotBanner(){
  const g=document.getElementById('hb-grid');
  const ord={overdue:0,today:1,upcoming:2};
  const sorted=Object.entries(hotItems).map(([id,h])=>({id,...h,node:nodes.find(n=>n.id===id)})).filter(h=>h.node).sort((a,b)=>ord[a.urgency]-ord[b.urgency]);
  const seen=new Set(), uniq=sorted.filter(h=>{if(seen.has(h.text))return false;seen.add(h.text);return true});
  document.getElementById('hot-count').textContent=uniq.length+' items';
  g.innerHTML=uniq.map(h=>`<div class="hc ${h.urgency}" onclick="showDetail(nodes.find(n=>n.id==='${h.id}'))">
    <div class="hc-u">${h.urgency==='overdue'?'OVERDUE':h.urgency==='today'?'TODAY':'UPCOMING'}</div>

}

function buildCalendar(){
  const c=document.getElementById('cal-view');
  let h='<div class="cal-inner">';
  h+=buildMonth(2026,3,'April 2026');
  h+=buildMonth(2026,4,'May 2026');
  h+='<div class="tl-sec"><div class="tl-sec-t" style="color:#ef4444">Full Timeline</div>';
  const today='2026-04-14';
  [...calEvents].sort((a,b)=>a.date.localeCompare(b.date)).forEach(ev=>{
    const cls=ev.urgency==='overdue'?'overdue':ev.date===today?'today-tl':'upcoming-tl';
    const ds=new Date(ev.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    h+=`<div class="tl-item ${cls}" onclick="showDetail(nodes.find(n=>n.id==='${ev.nodeId}'))">
      <div class="tl-dt ${cls}">${ds}</div>
      <div class="tl-c"><div class="tl-l">${ev.label}</div><div class="tl-d">${ev.text}</div></div>
      <div class="tl-b" style="background:${ev.urgency==='overdue'?'rgba(239,68,68,.15);color:#fca5a5':ev.urgency==='today'?'rgba(245,158,11,.15);color:#fcd34d':'rgba(59,130,246,.15);color:#93c5fd'}">${ev.urgency==='overdue'?'OVERDUE':ev.date===today?'TODAY':'UPCOMING'}</div></div>`;
  });
  h+='</div></div>';
  c.innerHTML=h;
}

function buildMonth(yr,mo,title){
  const today='2026-04-14';
  const fd=new Date(yr,mo,1).getDay(), dim=new Date(yr,mo+1,0).getDate();
  const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let h=`<div class="cal-mh">${title}</div><div class="cal-g">`;
  dn.forEach(d=>{h+=`<div class="cal-dh">${d}</div>`});
  for(let i=0;i<fd;i++) h+='<div class="cal-d empty"></div>';
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===today;
    const evs=calEvents.filter(e=>e.date===ds);
    h+=`<div class="cal-d${isT?' td':''}"><div class="cal-dn">${d}</div>`;
    evs.forEach(ev=>{
      const cls=ev.urgency==='overdue'?'overdue':(isT?'today-ev':'upcoming-ev');
      h+=`<div class="cal-ev ${cls}" onclick="showDetail(nodes.find(n=>n.id==='${ev.nodeId}'))">${ev.label}</div>`;
    });
    h+='</div>';
  }
  return h+'</div>';
}

    hotN.forEach(n=>{h+=mCard(n)});

    const tn=nodes.filter(n=>n.type===type&&!n.hot);

    h+=`<div class="mob-sec"><div class="mob-sec-t" style="color:${TC[type]}"><div class="mob-dot" style="background:${TC[type]}"></div>${type.charAt(0).toUpperCase()+type.slice(1)}s</div>`;
    tn.forEach(n=>{h+=mCard(n)});
    h+='</div>';

}

  h+=`<div class="mob-c-title"><span>${n.detail?.title||n.label}</span>`;
  if(isClient) h+=`<span style="color:${CLIENT_CLR};font-size:14px">&#9733;</span>`;
  h+=`<span class="mob-c-badge" style="background:${nodeColorDim(n)};color:${clr}">${n.type}${n.subtype?' &middot; '+n.subtype:''}${n.role?' &middot; '+n.role:''}</span></div>`;
  if(hi) h+=`<div class="mob-c-hot ${hi.urgency}">${hi.urgency==='overdue'?'&#9888; ':hi.urgency==='today'?'&#9200; ':'&#128197; '}${hi.text}</div>`;
  if(n.detail?.summary) h+=`<div class="mob-c-sum">${n.detail.summary}</div>`;
  h+='<div class="mob-c-det">';
  if(n.detail?.nextHearing) h+=`<p style="font-size:12px;color:#fcd34d;margin-bottom:6px"><strong>Next:</strong> ${n.detail.nextHearing}</p>`;
  if(n.detail?.caseNo) h+=`<p style="font-size:12px;color:#94a3b8;margin-bottom:6px;font-family:JetBrains Mono,monospace">${n.detail.caseNo}</p>`;
  const conn=[];
  dl.forEach(l=>{
    const sid=typeof l.source==='object'?l.source.id:l.source;
    const tid=typeof l.target==='object'?l.target.id:l.target;
    if(sid===n.id){const t=nodes.find(nd=>nd.id===tid);if(t)conn.push(t)}
    if(tid===n.id){const s=nodes.find(nd=>nd.id===sid);if(s)conn.push(s)}
  });
  if(conn.length){
    h+=`<p style="font-size:11px;color:#64748b;margin-top:8px;margin-bottom:4px">Connections:</p>`;
    h+=conn.map(c=>`<span class="rc" style="color:${nodeColor(c)};border-color:${nodeColor(c)}33" onclick="event.stopPropagation();showDetail(nodes.find(n=>n.id==='${c.id}'))">${c.label}</span>`).join('');
  }
  h+=`<p style="margin-top:10px"><span class="rc" style="color:#a5b4fc;border-color:rgba(99,102,241,.3)" onclick="event.stopPropagation();showDetail(nodes.find(nd=>nd.id==='${n.id}'))">Open detail &rarr;</span></p>`;
  h+='</div></div>';
  return h;
}

// ============================================================
// D3 GRAPH
// ============================================================

const svg=d3.select('#graph-svg');
let W=window.innerWidth, H=window.innerHeight;

const zoom=d3.zoom().scaleExtent([0.2,4]).on('zoom',e=>container.attr('transform',e.transform));
svg.call(zoom);
const container=svg.append('g');
const defs=svg.append('defs');

// Glow filter
const gf=defs.append('filter').attr('id','glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
gf.append('feGaussianBlur').attr('stdDeviation','4').attr('result','b');
const gm=gf.append('feMerge');gm.append('feMergeNode').attr('in','b');gm.append('feMergeNode').attr('in','SourceGraphic');

// Urgency glow filters
[['overdue','#ef4444',10],['today-glow','#f59e0b',8],['upcoming-glow','#3b82f6',6]].forEach(([name,clr,std])=>{
  const f=defs.append('filter').attr('id',name).attr('x','-200%').attr('y','-200%').attr('width','500%').attr('height','500%');
  f.append('feFlood').attr('flood-color',clr).attr('flood-opacity',.4).attr('result','fl');
  f.append('feComposite').attr('in','fl').attr('in2','SourceGraphic').attr('operator','in').attr('result','m');
  f.append('feGaussianBlur').attr('in','m').attr('stdDeviation',std).attr('result','bl');
  const mg=f.append('feMerge');mg.append('feMergeNode').attr('in','bl');mg.append('feMergeNode').attr('in','SourceGraphic');
});

// Star symbol for client contacts
defs.append('symbol').attr('id','star').attr('viewBox','0 0 24 24')
  .append('path').attr('d','M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z')
  .attr('fill',CLIENT_CLR);

const simulation = d3.forceSimulation(nodes)
  .force('link',d3.forceLink(dl).id(d=>d.id).distance(d=>{
    const s=nodes.find(n=>n.id===(d.source.id||d.source));
    const t=nodes.find(n=>n.id===(d.target.id||d.target));
    return(s&&t&&s.type===t.type)?80:140;
  }).strength(0.4))
  .force('charge',d3.forceManyBody().strength(-350).distanceMax(500))
  .force('center',d3.forceCenter(W/2,H/2))
  .force('collision',d3.forceCollide().radius(d=>nodeRadius(d)+15))
  .force('x',d3.forceX(W/2).strength(0.04))
  .force('y',d3.forceY(H/2).strength(0.04));

// Links
const linkG=container.append('g');
const link=linkG.selectAll('line').data(dl).join('line').attr('class','link')
  .attr('stroke',d=>{const s=typeof d.source==='object'?d.source:nodes.find(n=>n.id===d.source);return s?nodeColor(s):'#334155'})
  .attr('stroke-opacity',0.15).attr('stroke-width',1.5);

// Nodes
const nodeG=container.append('g');
const node=nodeG.selectAll('g').data(nodes).join('g')
  .style('cursor','pointer')
  .call(d3.drag().on('start',(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
    .on('end',(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null}));

// Expanding pulse rings for hot nodes
node.filter(d=>d.hot).each(function(d){
  const g=d3.select(this);
  const hi=hotItems[d.id];
  const clr=hi?.urgency==='overdue'?'#ef4444':hi?.urgency==='today'?'#f59e0b':'#3b82f6';
  const r=nodeRadius(d);
  const an=hi?.urgency==='overdue'?'pulseOverdue':hi?.urgency==='today'?'pulseToday':'pulseUpcoming';
  for(let i=0;i<2;i++){
    g.append('circle').attr('r',r).attr('fill',clr).attr('stroke','none').attr('opacity',0)
      .style('animation',`${an} 3s ease-out ${i*1.5}s infinite`);
  }
});

// Spinning dashed hot ring
node.filter(d=>d.hot).append('circle').attr('class','hot-ring')
  .attr('r',d=>nodeRadius(d)+5).attr('fill','none')
  .attr('stroke',d=>{const hi=hotItems[d.id];return hi?.urgency==='overdue'?'#ef4444':hi?.urgency==='today'?'#f59e0b':'#3b82f6'})
  .attr('stroke-width',2.5).attr('stroke-dasharray','6,4').attr('opacity',0.9);

// Background glow
node.append('circle')
  .attr('r',d=>nodeRadius(d)+(d.hot?16:8))
  .attr('fill',d=>{
    if(d.hot){const hi=hotItems[d.id];return hi?.urgency==='overdue'?'#ef4444':hi?.urgency==='today'?'#f59e0b':nodeColor(d)}
    return nodeColor(d);
  })
  .attr('opacity',d=>d.hot?0.2:0.08)
  .attr('filter',d=>{
    if(!d.hot)return 'url(#glow)';
    const hi=hotItems[d.id];
    return hi?.urgency==='overdue'?'url(#overdue)':hi?.urgency==='today'?'url(#today-glow)':'url(#upcoming-glow)';
  });

// Main circle
node.append('circle').attr('class','nc')
  .attr('r',d=>nodeRadius(d))
  .attr('fill',d=>{const c=d3.color(nodeColor(d));return d.hasPage?c.toString():c.darker(0.8).toString()})
  .attr('fill-opacity',d=>d.hasPage?0.85:0.45)
  .attr('stroke',d=>nodeColor(d))
  .attr('stroke-width',d=>d.hasPage?2.5:1.5)
  .attr('stroke-opacity',d=>d.hasPage?0.9:0.4);

// Client star badge on contact nodes with role:client
node.filter(d=>d.type==='contact'&&d.role==='client')
  .append('use').attr('href','#star')
  .attr('width',12).attr('height',12)
  .attr('x',d=>nodeRadius(d)-4).attr('y',d=>-nodeRadius(d)-4);

// Client star for judge/expert/opposing too — show role indicator
// Actually just show star for clients. For judges show a small "J" badge etc.
node.filter(d=>d.type==='contact'&&d.role==='judge')
  .append('circle')
  .attr('cx',d=>nodeRadius(d)*0.7).attr('cy',d=>-nodeRadius(d)*0.7)
  .attr('r',6).attr('fill','#1e293b').attr('stroke',TC.court).attr('stroke-width',1.5);
node.filter(d=>d.type==='contact'&&d.role==='judge')
  .append('text').attr('x',d=>nodeRadius(d)*0.7).attr('y',d=>-nodeRadius(d)*0.7)
  .attr('text-anchor','middle').attr('dominant-baseline','central')
  .attr('fill',TC.court).attr('font-size','7px').attr('font-weight','700').attr('font-family',"'JetBrains Mono',monospace")
  .attr('pointer-events','none').text('J');

node.filter(d=>d.type==='contact'&&d.role==='expert')
  .append('circle')
  .attr('cx',d=>nodeRadius(d)*0.7).attr('cy',d=>-nodeRadius(d)*0.7)
  .attr('r',6).attr('fill','#1e293b').attr('stroke',TC.authority).attr('stroke-width',1.5);
node.filter(d=>d.type==='contact'&&d.role==='expert')
  .append('text').attr('x',d=>nodeRadius(d)*0.7).attr('y',d=>-nodeRadius(d)*0.7)
  .attr('text-anchor','middle').attr('dominant-baseline','central')
  .attr('fill',TC.authority).attr('font-size','7px').attr('font-weight','700').attr('font-family',"'JetBrains Mono',monospace")
  .attr('pointer-events','none').text('E');

// Type letter
node.append('text').attr('text-anchor','middle').attr('dominant-baseline','central')
  .attr('fill','#fff').attr('font-size',d=>nodeRadius(d)*0.65+'px')
  .attr('font-weight','700').attr('font-family',"'JetBrains Mono',monospace")
  .attr('opacity',0.9).attr('pointer-events','none')
  .text(d=>typeLetter(d));

// Labels
const labels=nodeG.selectAll('text.node-label').data(nodes).join('text')
  .attr('class','node-label').attr('dy',d=>nodeRadius(d)+14)
  .attr('fill','#94a3b8').attr('font-size','10px').text(d=>d.label);

// Tooltip
const tip=document.getElementById('tooltip');
node.on('mouseover',function(e,d){
  const isClient=d.type==='contact'&&d.role==='client';
  tip.innerHTML=`<strong>${d.label}</strong>${isClient?' &#9733;':''}<br><span style="color:${nodeColor(d)};font-size:11px">${d.type}${d.subtype?' &middot; '+d.subtype:''}${d.role?' &middot; '+d.role:''}</span>${d.hot?`<br><span style="color:#fca5a5;font-size:11px">${hotItems[d.id]?.text||''}</span>`:''}`;
  tip.classList.add('visible');
  const conn=new Set([d.id]);
  dl.forEach(l=>{const sid=typeof l.source==='object'?l.source.id:l.source;const tid=typeof l.target==='object'?l.target.id:l.target;if(sid===d.id)conn.add(tid);if(tid===d.id)conn.add(sid)});
  node.selectAll('.nc').attr('opacity',n=>conn.has(n.id)?1:0.15);
  labels.attr('opacity',n=>conn.has(n.id)?1:0.1);
  link.attr('stroke-opacity',l=>{const sid=typeof l.source==='object'?l.source.id:l.source;const tid=typeof l.target==='object'?l.target.id:l.target;return(sid===d.id||tid===d.id)?0.5:0.03}).attr('stroke-width',l=>{const sid=typeof l.source==='object'?l.source.id:l.source;const tid=typeof l.target==='object'?l.target.id:l.target;return(sid===d.id||tid===d.id)?2.5:1});
});
node.on('mousemove',function(e){tip.style.left=(e.pageX+14)+'px';tip.style.top=(e.pageY-14)+'px'});
node.on('mouseout',function(){
  tip.classList.remove('visible');
  node.selectAll('.nc').attr('opacity',1);
  labels.attr('opacity',1);
  link.attr('stroke-opacity',0.15).attr('stroke-width',1.5);
});
node.on('click',function(e,d){e.stopPropagation();showDetail(d)});
svg.on('click',()=>closePanel());

document.getElementById('sn').textContent=nodes.length;
document.getElementById('se').textContent=dl.length;
document.getElementById('sh').textContent=Object.keys(hotItems).length;

simulation.on('tick',()=>{
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  node.attr('transform',d=>`translate(${d.x},${d.y})`);
  labels.attr('x',d=>d.x).attr('y',d=>d.y);
});

// ============================================================
// DETAIL PANEL
// ============================================================
function showDetail(d){
  const panel=document.getElementById('detail-panel');
  const badge=document.getElementById('p-badge');
  const title=document.getElementById('p-title');
  const status=document.getElementById('p-status');
  const body=document.getElementById('p-body');
  const clr=nodeColor(d);
  const isClient=d.type==='contact'&&d.role==='client';

  // Badge with subtype/role info
  let badgeText=d.type;
  if(d.subtype) badgeText+=` &middot; ${d.subtype}`;
  if(d.role) badgeText+=` &middot; ${d.role}`;
  if(d.level) badgeText+=` &middot; ${d.level}`;
  badge.innerHTML=(isClient?'&#9733; ':'')+badgeText;
  badge.style.background=nodeColorDim(d);
  badge.style.color=clr;

  title.textContent=d.detail?.title||d.label;

  const sc=d.status==='current'?'#22c55e':d.status==='needs-review'?'#f59e0b':'#64748b';
  status.innerHTML=`<span class="sdot" style="background:${sc}"></span>${d.status}${d.hasPage?'':' &middot; <span style="color:#64748b">no wiki page yet</span>'}`;

  let h='';
  const hi=hotItems[d.id];
  if(hi){
    const icons={overdue:'&#128308;',today:'&#128993;',upcoming:'&#128309;'};
    h+=`<div class="uf ${hi.urgency}"><span class="fi">${icons[hi.urgency]}</span><span>${hi.text}</span></div>`;
  }

  if(d.detail?.subtitle) h+=`<div class="p-sec"><p style="font-size:12px;color:#94a3b8;font-style:italic">${d.detail.subtitle}</p></div>`;
  if(d.detail?.summary) h+=`<div class="p-sec"><div class="p-sec-t">Summary</div><p>${d.detail.summary}</p></div>`;
  if(d.detail?.aliases) h+=`<div class="p-sec"><div class="p-sec-t">Aliases</div><p style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#94a3b8">${d.detail.aliases}</p></div>`;
  if(d.detail?.caseNo) h+=`<div class="p-sec"><div class="p-sec-t">Case Number</div><p style="font-family:'JetBrains Mono',monospace;font-size:13px">${d.detail.caseNo}</p></div>`;
  if(d.detail?.nextHearing) h+=`<div class="p-sec"><div class="p-sec-t">Next Hearing</div><p>${d.detail.nextHearing}</p></div>`;
  if(d.detail?.keyHoldings) h+=`<div class="p-sec"><div class="p-sec-t">Key Holdings</div>${d.detail.keyHoldings.map(x=>`<p style="margin-bottom:6px;font-size:12px;line-height:1.5">&#x2022; ${x}</p>`).join('')}</div>`;
  if(d.detail?.roleHistory) h+=`<div class="p-sec"><div class="p-sec-t">Role History</div>${d.detail.roleHistory.map(x=>`<p style="margin-bottom:6px;font-size:12px;line-height:1.5">&#x2022; ${x}</p>`).join('')}</div>`;
  if(d.detail?.playbook) h+=`<div class="p-sec"><div class="p-sec-t">Playbook</div>${d.detail.playbook.map(x=>`<p style="margin-bottom:6px;font-size:12px;line-height:1.5">${x}</p>`).join('')}</div>`;
  const matters=d.detail?.mattersUsed||d.detail?.affectedMatters||d.detail?.mattersHere;
  if(matters) h+=`<div class="p-sec"><div class="p-sec-t">Related Matters</div>${matters.map(x=>`<p style="margin-bottom:6px;font-size:12px;line-height:1.5">&#x2022; ${x}</p>`).join('')}</div>`;
  if(d.detail?.notes) h+=`<div class="p-sec"><div class="p-sec-t">Practice Notes</div>${d.detail.notes.map(x=>`<p style="margin-bottom:6px;font-size:12px;line-height:1.5">&#x2022; ${x}</p>`).join('')}</div>`;
  if(d.detail?.pitfalls) h+=`<div class="p-sec"><div class="p-sec-t">Pitfalls</div>${d.detail.pitfalls.map(x=>`<p style="margin-bottom:6px;font-size:12px;line-height:1.5;color:#fca5a5">&#x26A0; ${x}</p>`).join('')}</div>`;

  const conn=[];
  dl.forEach(l=>{
    const sid=typeof l.source==='object'?l.source.id:l.source;const tid=typeof l.target==='object'?l.target.id:l.target;
    if(sid===d.id){const t=nodes.find(n=>n.id===tid);if(t)conn.push({node:t,label:l.label})}
    if(tid===d.id){const s=nodes.find(n=>n.id===sid);if(s)conn.push({node:s,label:l.label})}
  });
  if(conn.length) h+=`<div class="p-sec"><div class="p-sec-t">Connections (${conn.length})</div>${conn.map(c=>`<span class="rc" style="color:${nodeColor(c.node)};border-color:${nodeColor(c.node)}33" onclick="navigateToNode('${c.node.id}')">${c.node.label} <span style="color:#64748b;font-size:10px">${c.label}</span></span>`).join('')}</div>`;

  body.innerHTML=h;
  panel.classList.add('open');
}

function closePanel(){document.getElementById('detail-panel').classList.remove('open')}

function navigateToNode(id){
  const d=nodes.find(n=>n.id===id);
  if(d){
    showDetail(d);
    if(currentView==='graph'){
      const tr=d3.zoomTransform(svg.node());
      svg.transition().duration(600).call(zoom.transform,d3.zoomIdentity.translate(W/2-d.x*tr.k,H/2-d.y*tr.k).scale(tr.k));
    }
  }
}

// ============================================================
// SEARCH
// ============================================================
const si=document.getElementById('search-input');
si.addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  if(!q){node.selectAll('.nc').attr('opacity',1);labels.attr('opacity',1);link.attr('stroke-opacity',0.15);return}
  const m=new Set();
  nodes.forEach(n=>{const t=[n.label,n.type,n.subtype,n.role,n.level,n.detail?.title,n.detail?.aliases,n.detail?.summary,n.detail?.caseNo].filter(Boolean).join(' ').toLowerCase();if(t.includes(q))m.add(n.id)});
  node.selectAll('.nc').attr('opacity',n=>m.has(n.id)?1:0.1);
  labels.attr('opacity',n=>m.has(n.id)?1:0.08);
  link.attr('stroke-opacity',0.03);
  if(m.size===1){const id=[...m][0];const d=nodes.find(n=>n.id===id);if(d){const tr=d3.zoomTransform(svg.node());svg.transition().duration(400).call(zoom.transform,d3.zoomIdentity.translate(W/2-d.x*tr.k,H/2-d.y*tr.k).scale(tr.k))}}
});

// ============================================================
// FILTER
// ============================================================
let af='all';
document.querySelectorAll('.fp').forEach(pill=>{
  pill.addEventListener('click',function(){
    document.querySelectorAll('.fp').forEach(p=>p.classList.remove('active'));
    this.classList.add('active');
    af=this.dataset.type;
    if(af==='all'){node.style('display','block');labels.style('display','block');link.style('display','block');node.selectAll('.nc').attr('opacity',1);labels.attr('opacity',1);link.attr('stroke-opacity',0.15)}
    else{
      const mids=new Set(nodes.filter(n=>n.type===af).map(n=>n.id));
      const ext=new Set(mids);
      dl.forEach(l=>{const sid=typeof l.source==='object'?l.source.id:l.source;const tid=typeof l.target==='object'?l.target.id:l.target;if(mids.has(sid))ext.add(tid);if(mids.has(tid))ext.add(sid)});
      node.style('display',d=>ext.has(d.id)?'block':'none');
      labels.style('display',d=>ext.has(d.id)?'block':'none');
      node.selectAll('.nc').attr('opacity',d=>mids.has(d.id)?1:0.35);
      labels.attr('opacity',d=>mids.has(d.id)?1:0.4);
      link.style('display',l=>{const sid=typeof l.source==='object'?l.source.id:l.source;const tid=typeof l.target==='object'?l.target.id:l.target;return(ext.has(sid)&&ext.has(tid))?'block':'none'});
      link.attr('stroke-opacity',l=>{const sid=typeof l.source==='object'?l.source.id:l.source;const tid=typeof l.target==='object'?l.target.id:l.target;return(mids.has(sid)||mids.has(tid))?0.3:0.08});
    }
    simulation.alpha(0.3).restart();
  });
});

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closePanel();si.value='';si.dispatchEvent(new Event('input'))}
  if(e.key==='/'&&document.activeElement!==si){e.preventDefault();si.focus()}
  if(e.key==='1')switchView('graph');if(e.key==='2')switchView('calendar');if(e.key==='3')switchView('cards');
});

// ============================================================
// INIT
// ============================================================
buildHotBanner();

setTimeout(()=>{
  const b=container.node().getBBox();
  const bH=bannerCollapsed?0:130;
  const sc=Math.min(W/(b.width+100),(H-56-bH)/(b.height+100),1.5)*0.85;
  const tx=W/2-(b.x+b.width/2)*sc;
  const ty=((H-56-bH)/2+56+bH)-(b.y+b.height/2)*sc;
  svg.transition().duration(1000).ease(d3.easeCubicOut).call(zoom.transform,d3.zoomIdentity.translate(tx,ty).scale(sc));
},2000);

if(window.innerWidth<=600){switchView('cards');toggleBanner()}

</script>
</body>
</html>
